services:
  webklip:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - webklip-data:/data
    environment:
      DATA_DIR: /data
      PORT: ${PORT:-3000}
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-contact@logimaxx.ro}
      SITE_URL: ${SITE_URL:-https://webklip.com}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      # Per-IP rate limits (rolling 1-hour window; IP from X-Forwarded-For / X-Real-IP)
      RATE_LIMIT_CLIPS_PER_HOUR: ${RATE_LIMIT_CLIPS_PER_HOUR:-30}  # POST /api/v1/clips/:slug
      RATE_LIMIT_API_PER_HOUR: ${RATE_LIMIT_API_PER_HOUR:-200}      # all /api/* routes
      CLEANUP_INTERVAL_MS: ${CLEANUP_INTERVAL_MS:-60000}
      ENABLE_AUTH_API: ${ENABLE_AUTH_API:-false}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      UMAMI_SCRIPT_URL: ${UMAMI_SCRIPT_URL:-}
      UMAMI_URL: ${UMAMI_URL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    restart: unless-stopped

volumes:
  webklip-data:
